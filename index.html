<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AB Trade - Трейдинг Калькулятор</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height: 100vh;
    background: #0f111a;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    font-family: 'Segoe UI', sans-serif;
  }
  .card {
    width: 100%;
    max-width: 400px;
    background: linear-gradient(170deg,#1a1f2e,#141824);
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    border: 1px solid #252c3d;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
  }
  .logo {
    width:48px; height:48px; border-radius:14px;
    background: linear-gradient(135deg,#a16207,#eab308);
    display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:15px; color:#000;
    box-shadow: 0 4px 14px rgba(234,179,8,0.4);
    flex-shrink: 0;
  }
  .header-sub { color:#eab308; font-size:10px; letter-spacing:2.5px; font-weight:700; }
  .header-title { color:#e2e8f0; font-size:19px; font-weight:700; }
  .section-label {
    color:#64748b; font-size:10px; letter-spacing:2.5px; margin-bottom:10px;
  }
  .dir-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
  .dir-btn {
    padding:14px 0; border-radius:12px; border:none; cursor:pointer;
    font-weight:800; font-size:15px; letter-spacing:1.5px;
    transition: all 0.18s;
    background:#1e2535; color:#334155; border:1px solid #252c3d;
  }
  .dir-btn.active-buy {
    background: linear-gradient(135deg,#14532d,#16a34a);
    color:#fff; border:1px solid #16a34a;
    box-shadow: 0 4px 18px rgba(22,163,74,0.3);
  }
  .dir-btn.active-sell {
    background: linear-gradient(135deg,#7f1d1d,#dc2626);
    color:#fff; border:1px solid #dc2626;
    box-shadow: 0 4px 18px rgba(220,38,38,0.3);
  }
  .input-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
  .input-label { color:#475569; font-size:10px; letter-spacing:2px; margin-bottom:6px; }
  input[type=number] {
    width:100%;
    background:#0f1622; border:1px solid #252c3d;
    border-radius:12px; padding:13px 12px;
    color:#e2e8f0; font-size:22px; font-weight:700;
    outline:none; font-family:inherit;
    -moz-appearance: textfield;
  }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type=number]:focus { border-color:#eab308; }
  .range-bar {
    display:flex; justify-content:space-between; align-items:center;
    background:#0f1622; border:1px solid #252c3d;
    border-radius:10px; padding:9px 14px; margin-bottom:14px;
  }
  .range-text { color:#64748b; font-size:12px; }
  .range-val { color:#e2e8f0; font-weight:800; }
  .range-badge {
    font-size:11px; padding:2px 10px; border-radius:6px; font-weight:700;
  }
  .badge-good { background:rgba(22,163,74,0.12); color:#4ade80; }
  .badge-warn { background:rgba(251,191,36,0.12); color:#fbbf24; }
  .error-box {
    background:rgba(220,38,38,0.08); border:1px solid rgba(220,38,38,0.25);
    border-radius:10px; padding:10px 14px; margin-bottom:12px;
    color:#f87171; font-size:13px; display:none;
  }
  .calc-btn {
    width:100%; padding:15px 0;
    background:linear-gradient(135deg,#a16207,#eab308);
    border:none; border-radius:12px; cursor:pointer;
    color:#000; font-weight:900; font-size:14px; letter-spacing:2px;
    box-shadow:0 4px 20px rgba(234,179,8,0.25); font-family:inherit;
    margin-bottom: 0;
    transition: opacity 0.15s;
  }
  .calc-btn:active { opacity:0.85; }
  .results { display:none; margin-top:20px; }
  .results-label { color:#64748b; font-size:10px; letter-spacing:2.5px; margin-bottom:12px; }
  .result-row {
    display:flex; align-items:center; justify-content:space-between;
    background:#0f1622; border:1px solid #252c3d;
    border-radius:14px; padding:14px 16px; margin-bottom:10px;
  }
  .row-label {
    padding:5px 12px; border-radius:8px;
    font-size:12px; font-weight:700;
  }
  .lbl-razvrot  { background:rgba(239,68,68,0.13);  border:1px solid rgba(239,68,68,0.35);  color:#ef4444; }
  .lbl-korr     { background:rgba(129,140,248,0.13); border:1px solid rgba(129,140,248,0.35); color:#818cf8; }
  .lbl-konsol   { background:rgba(167,139,250,0.13); border:1px solid rgba(167,139,250,0.35); color:#a78bfa; }
  .row-right { display:flex; align-items:center; gap:10px; }
  .row-price { font-size:22px; font-weight:800; }
  .price-buy  { color:#16a34a; }
  .price-sell { color:#dc2626; }
  .sig-badge {
    padding:4px 10px; border-radius:7px;
    font-size:11px; font-weight:800; letter-spacing:1px; color:#fff;
  }
  .sig-buy  { background:rgba(22,163,74,0.88); }
  .sig-sell { background:rgba(185,28,28,0.88); }
  .footer {
    text-align:center; margin-top:14px;
    color:#1e2535; font-size:11px; letter-spacing:1.5px;
  }
</style>
</head>
<body>
<div class="card">
  <!-- Header -->
  <div class="header">
    <div class="logo">AB</div>
    <div>
      <div class="header-sub">XAUUSD · GOLD/USD</div>
      <div class="header-title">Трейдинг Калькулятор</div>
    </div>
  </div>

  <!-- Direction -->
  <div class="section-label">НАПРАВЛЕНИЕ РЫНКА</div>
  <div class="dir-grid">
    <button class="dir-btn active-buy" id="btn-buy" onclick="setDir('BUY')">▲ BUY</button>
    <button class="dir-btn" id="btn-sell" onclick="setDir('SELL')">▼ SELL</button>
  </div>

  <!-- Inputs -->
  <div class="section-label">ДИАПАЗОН ДНЯ</div>
  <div class="input-grid">
    <div>
      <div class="input-label">HIGH</div>
      <input type="number" id="inp-high" placeholder="4680" oninput="onInput()" onkeydown="if(event.key==='Enter')calc()"/>
    </div>
    <div>
      <div class="input-label">LOW</div>
      <input type="number" id="inp-low" placeholder="4657" oninput="onInput()" onkeydown="if(event.key==='Enter')calc()"/>
    </div>
  </div>

  <div class="range-bar" id="range-bar" style="display:none">
    <span class="range-text">Range: <span class="range-val" id="range-val"></span></span>
    <span class="range-badge" id="range-badge"></span>
  </div>

  <div class="error-box" id="error-box"></div>

  <button class="calc-btn" onclick="calc()">⚡ HISOBLA</button>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-label">ТОЧКИ ВХОДА</div>
    <div class="result-row">
      <span class="row-label lbl-razvrot">Разворот</span>
      <div class="row-right">
        <span class="row-price" id="p-razvrot"></span>
        <span class="sig-badge" id="s-razvrot"></span>
      </div>
    </div>
    <div class="result-row">
      <span class="row-label lbl-korr">Коррекция</span>
      <div class="row-right">
        <span class="row-price" id="p-korr"></span>
        <span class="sig-badge" id="s-korr"></span>
      </div>
    </div>
    <div class="result-row">
      <span class="row-label lbl-konsol">Консолидация</span>
      <div class="row-right">
        <span class="row-price" id="p-konsol"></span>
        <span class="sig-badge" id="s-konsol"></span>
      </div>
    </div>
  </div>
</div>

<div class="footer">© AB TRADE KG · @ab_tradekg</div>

<script>
  let direction = "BUY";

  function setDir(d) {
    direction = d;
    document.getElementById("btn-buy").className  = "dir-btn" + (d==="BUY"  ? " active-buy"  : "");
    document.getElementById("btn-sell").className = "dir-btn" + (d==="SELL" ? " active-sell" : "");
    document.getElementById("results").style.display = "none";
  }

  function onInput() {
    const h = parseFloat(document.getElementById("inp-high").value);
    const l = parseFloat(document.getElementById("inp-low").value);
    const bar = document.getElementById("range-bar");
    if (!isNaN(h) && !isNaN(l) && h !== l) {
      const r = Math.abs(h - l).toFixed(2);
      document.getElementById("range-val").textContent = r;
      const badge = document.getElementById("range-badge");
      if (+r >= 60) { badge.textContent="≥60 ✓"; badge.className="range-badge badge-good"; }
      else          { badge.textContent="<60";    badge.className="range-badge badge-warn"; }
      bar.style.display = "flex";
    } else {
      bar.style.display = "none";
    }
    document.getElementById("results").style.display = "none";
    document.getElementById("error-box").style.display = "none";
  }

  function showError(msg) {
    const el = document.getElementById("error-box");
    el.textContent = msg;
    el.style.display = "block";
  }

  function setRow(priceId, sigId, price, signal) {
    const pel = document.getElementById(priceId);
    const sel = document.getElementById(sigId);
    pel.textContent = price.toFixed(2);
    pel.className = "row-price " + (signal==="BUY" ? "price-buy" : "price-sell");
    sel.textContent = signal;
    sel.className = "sig-badge " + (signal==="BUY" ? "sig-buy" : "sig-sell");
  }

  function calc() {
    const h = parseFloat(document.getElementById("inp-high").value);
    const l = parseFloat(document.getElementById("inp-low").value);
    if (isNaN(h) || isNaN(l)) { showError("HIGH va LOW kiriting!"); return; }
    if (h === l)               { showError("HIGH va LOW bir xil bo'lmasin!"); return; }
    document.getElementById("error-box").style.display = "none";

    const H = Math.max(h, l);
    const L = Math.min(h, l);
    const R = H - L;

    let razvrot, razvrot_sig, korr, korr_sig, konsol, konsol_sig;

    if (direction === "BUY") {
      razvrot = H + R * 0.38;  razvrot_sig = "SELL";
      korr    = L + R * 0.25;  korr_sig    = "BUY";
      konsol  = L + R * 0.12;  konsol_sig  = "BUY";
    } else {
      razvrot = L - R * 0.38;  razvrot_sig = "BUY";
      korr    = H - R * 0.25;  korr_sig    = "SELL";
      konsol  = H - R * 0.12;  konsol_sig  = "SELL";
    }

    setRow("p-razvrot", "s-razvrot", razvrot, razvrot_sig);
    setRow("p-korr",    "s-korr",    korr,    korr_sig);
    setRow("p-konsol",  "s-konsol",  konsol,  konsol_sig);

    document.getElementById("results").style.display = "block";
  }
</script>
</body>
</html>
